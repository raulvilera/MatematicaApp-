<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matemática@App</title>

<!-- PWA essencial -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#C0392B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mate@App">
<link rel="apple-touch-icon" href="./icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #003F87 0%, #1565C0 30%, #42A5F5 65%, #E3F2FD 100%);
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  /* Bolhas decorativas de fundo */
  .bubble {
    position: fixed;
    border-radius: 50%;
    opacity: 0.18;
    animation: floatBubble linear infinite;
  }
  .bubble:nth-child(1){width:320px;height:320px;background:#ffffff;top:-80px;left:-80px;animation-duration:18s;}
  .bubble:nth-child(2){width:200px;height:200px;background:#90CAF9;bottom:-60px;right:-50px;animation-duration:14s;}
  .bubble:nth-child(3){width:120px;height:120px;background:#BBDEFB;top:40%;right:5%;animation-duration:10s;opacity:0.12;}
  .bubble:nth-child(4){width:80px;height:80px;background:#ffffff;top:20%;left:8%;animation-duration:12s;opacity:0.15;}
  @keyframes floatBubble {
    0%{transform:translateY(0) scale(1);}
    50%{transform:translateY(-18px) scale(1.04);}
    100%{transform:translateY(0) scale(1);}
  }

  /* Card central */
  .card {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: cardIn 0.8s cubic-bezier(0.34,1.4,0.64,1) both;
  }
  @keyframes cardIn {
    from{opacity:0;transform:translateY(40px) scale(0.92);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }

  /* Ícone / logo */
  .icon-wrap {
    width: 100px;
    height: 100px;
    border-radius: 28px;
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(12px);
    border: 2px solid rgba(255,255,255,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    box-shadow: 0 12px 40px rgba(0,50,140,0.35);
    animation: iconPulse 2.8s ease-in-out infinite;
    margin-bottom: 1.6rem;
  }
  @keyframes iconPulse {
    0%,100%{transform:scale(1);box-shadow:0 12px 40px rgba(0,50,140,0.35);}
    50%{transform:scale(1.05);box-shadow:0 18px 50px rgba(0,80,200,0.45);}
  }

  /* Nome principal */
  .app-name {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: clamp(2.2rem, 8vw, 3.4rem);
    letter-spacing: -0.5px;
    line-height: 1;
    text-align: center;
    margin-bottom: 0.55rem;
  }
  .app-name .mat { color: #ffffff; text-shadow: 0 2px 12px rgba(0,40,120,0.3); }
  .app-name .at  {
    color: transparent;
    -webkit-text-stroke: 2.5px rgba(255,255,255,0.9);
    font-family: 'JetBrains Mono', monospace;
  }
  .app-name .appword {
    color: #E3F2FD;
    text-shadow: 0 2px 12px rgba(0,40,120,0.3);
  }

  /* Subtítulo */
  .subtitle {
    font-size: clamp(0.8rem, 2.5vw, 1rem);
    color: rgba(255,255,255,0.82);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 2.2rem;
    text-align: center;
  }

  /* Barra de carregamento */
  .progress-wrap {
    width: clamp(200px, 55vw, 320px);
    height: 5px;
    background: rgba(255,255,255,0.25);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 1.1rem;
  }
  .progress-bar {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #ffffff, #90CAF9);
    width: 0%;
    animation: loadBar 2.4s cubic-bezier(0.4,0,0.2,1) forwards;
    animation-delay: 0.3s;
  }
  @keyframes loadBar {
    0%{width:0%;}
    60%{width:75%;}
    100%{width:100%;}
  }

  .install-btn {
    display: none;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1.5rem;
    padding: 0.65rem 1.4rem;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 99px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: all 0.2s;
    animation: cardIn 0.5s 1s both;
  }
  .install-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.04); }
  .install-btn span { font-size: 1.1rem; }
    font-size: 0.72rem;
    color: rgba(255,255,255,0.65);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:0.5;}50%{opacity:1;}}

  /* Partículas matemáticas */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    color: rgba(255,255,255,0.25);
    font-weight: 900;
    animation: particleFly linear infinite;
    user-select: none;
  }
  @keyframes particleFly {
    0%{transform:translateY(110vh) rotate(0deg);opacity:0;}
    10%{opacity:1;}
    90%{opacity:0.6;}
    100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
  }
</style>
</head>
<body>

<!-- Bolhas de fundo -->
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<!-- Partículas matemáticas flutuantes -->
<div class="particles" id="particles"></div>

<!-- Card central -->
<div class="card">
  <div class="icon-wrap">📐</div>

  <div class="app-name">
    <span class="mat">Matemática</span><span class="at">@</span><span class="appword">App</span>
  </div>

  <div class="subtitle">Currículo Paulista · EF/EM</div>

  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>
  <div class="loading-txt">Carregando…</div>
  <button class="install-btn" id="installBtn">
    <span>📲</span> Instalar App
  </button>

<script>
  // Partículas matemáticas flutuantes
  const symbols = ['π','∑','√','∫','×','÷','²','³','%','∞','Δ','θ','≠','≈','∓','±'];
  const container = document.getElementById('particles');
  for(let i = 0; i < 22; i++){
    const el = document.createElement('span');
    el.className = 'particle';
    el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    const size = 14 + Math.random()*22;
    el.style.cssText = `
      left:${Math.random()*100}%;
      font-size:${size}px;
      animation-duration:${6+Math.random()*10}s;
      animation-delay:${Math.random()*8}s;
    `;
    container.appendChild(el);
  }

  // Redirecionar após a animação
  setTimeout(() => {
    document.querySelector('.card').style.animation = 'cardIn 0.4s cubic-bezier(0.4,0,1,1) reverse forwards';
    setTimeout(() => { window.location.href = './mathem.html'; }, 350);
  }, 2800);

  // ── Registro do Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(reg => console.log('[SW] Registrado:', reg.scope))
      .catch(err => console.warn('[SW] Erro:', err));
  }

  // ── Botão de instalação PWA ──
  let deferredPrompt = null;
  const installBtn = document.getElementById('installBtn');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'flex';
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') installBtn.style.display = 'none';
    deferredPrompt = null;
  });

  window.addEventListener('appinstalled', () => {
    installBtn.style.display = 'none';
  });
</script>
</body>
</html>
